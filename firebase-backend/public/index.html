<!DOCTYPE html>
<html>
<head>
  <title>Zishu Metrics API</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>
  <h1>Zishu Metrics API</h1>
  <div id="metrics">Loading...</div>
  
  <script>
    // Firebase config (you'll get this from Firebase console)
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      databaseURL: "https://YOUR_PROJECT.firebaseio.com",
      projectId: "YOUR_PROJECT",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Simple API endpoints using URL parameters
    const params = new URLSearchParams(window.location.search);
    const action = params.get('action');

    if (action === 'sync') {
      // Handle sync
      const deviceId = params.get('device_id');
      const characters = parseInt(params.get('characters') || 0);
      const words = parseInt(params.get('words') || 0);
      const practiced = parseInt(params.get('practiced') || 0);
      
      if (deviceId) {
        database.ref('devices/' + deviceId).set({
          characters: characters,
          words: words,
          practiced: practiced,
          last_seen: new Date().toISOString()
        }).then(() => {
          document.body.innerHTML = JSON.stringify({
            success: true,
            sync_id: 'sync_' + Date.now()
          });
        });
      }
    } else if (action === 'metrics') {
      // Get metrics
      database.ref('devices').once('value').then((snapshot) => {
        const devices = snapshot.val() || {};
        const deviceList = Object.values(devices);
        
        const metrics = {
          total_users: deviceList.length,
          total_characters_learned: deviceList.reduce((sum, d) => sum + (d.characters || 0), 0),
          total_words_learned: deviceList.reduce((sum, d) => sum + (d.words || 0), 0),
          total_characters_practiced: deviceList.reduce((sum, d) => sum + (d.practiced || 0), 0),
          daily_active_users: deviceList.length,
          last_updated: new Date().toISOString()
        };
        
        document.body.innerHTML = '<pre>' + JSON.stringify(metrics, null, 2) + '</pre>';
      });
    } else {
      // Show current metrics
      database.ref('devices').on('value', (snapshot) => {
        const devices = snapshot.val() || {};
        const deviceList = Object.values(devices);
        
        const metrics = {
          total_users: deviceList.length,
          total_characters_learned: deviceList.reduce((sum, d) => sum + (d.characters || 0), 0),
          total_words_learned: deviceList.reduce((sum, d) => sum + (d.words || 0), 0),
          total_characters_practiced: deviceList.reduce((sum, d) => sum + (d.practiced || 0), 0)
        };
        
        document.getElementById('metrics').innerHTML = `
          <h2>Current Metrics:</h2>
          <p>Total Users: ${metrics.total_users}</p>
          <p>Characters Learned: ${metrics.total_characters_learned}</p>
          <p>Words Learned: ${metrics.total_words_learned}</p>
          <p>Characters Practiced: ${metrics.total_characters_practiced}</p>
        `;
      });
    }
  </script>
</body>
</html>
